server {
    listen 80;
    server_name testora.asafarim.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name testora.asafarim.com;

    # Test runs upload/return screenshots and HTML reports; give headroom.
    client_max_body_size 50m;

    ssl_certificate     /etc/letsencrypt/live/testora.asafarim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testora.asafarim.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Immutable Next.js build assets — cache hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Test runs stream progress and can take minutes — don't cut them off.
        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        proxy_buffering       off;
    }
}
