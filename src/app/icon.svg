<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="e2e-testora">
  <defs>
    <linearGradient id="et-bg" x1="40" y1="32" x2="472" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.52" stop-color="#7c5cf6"/>
      <stop offset="1" stop-color="#22a7f0"/>
    </linearGradient>
    <linearGradient id="et-check" x1="150" y1="360" x2="372" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf7ff"/>
    </linearGradient>
    <radialGradient id="et-glow" cx="0.32" cy="0.24" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="124" fill="url(#et-bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="124" fill="url(#et-glow)"/>

  <!-- end-to-end path that resolves into a "test passed" checkmark -->
  <path d="M152 262 L228 344 L372 166" fill="none" stroke="url(#et-check)"
        stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the two endpoints of the journey -->
  <circle cx="152" cy="262" r="30" fill="#ffffff"/>
  <circle cx="152" cy="262" r="13" fill="#7c5cf6"/>
  <circle cx="372" cy="166" r="30" fill="#ffffff"/>
  <circle cx="372" cy="166" r="13" fill="#1f9fed"/>

  <!-- spark accent, a nod to the original mark -->
  <path d="M408 250 l9 22 22 9 -22 9 -9 22 -9 -22 -22 -9 22 -9 z" fill="#ffffff" fill-opacity="0.9"/>
</svg>
